model_list:
  # Qwen3-VL-8B-Instruct-FP8 lokal (v0.40.0 in rose-spark) - Vision-Modell fuer docscan-Klassifizierung
  # 256K Context, OCR 32 Sprachen, verbesserte Spatial-Perception
  - model_name: qwen3-vl-8b
    litellm_params:
      model: openai/qwen3-vl-8b
      api_base: http://192.168.1.155:8015/v1
      api_key: dummy-vllm-no-auth
    model_info:
      mode: chat
      supports_vision: true
      supports_function_calling: false
      supports_response_schema: false
      max_tokens: 8192
      max_input_tokens: 8192
      max_output_tokens: 2048
      input_cost_per_token: 0.0
      output_cost_per_token: 0.0

  # Backward-Compat-Alias: existierende User mit docscan_model="qwen2.5-vl"
  # werden auf qwen3-vl-8b umgeleitet (Migration 026 in rose-spark migriert
  # User-Defaults parallel — Alias deckt edge-cases ab)
  - model_name: qwen2.5-vl
    litellm_params:
      model: openai/qwen3-vl-8b
      api_base: http://192.168.1.155:8015/v1
      api_key: dummy-vllm-no-auth
    model_info:
      mode: chat
      supports_vision: true
      supports_function_calling: false
      supports_response_schema: false
      max_tokens: 8192
      max_input_tokens: 8192
      max_output_tokens: 2048
      input_cost_per_token: 0.0
      output_cost_per_token: 0.0
  # qwen3.6 ohne Thinking — schnelle Antworten (Default fuer alle Tools)
  - model_name: qwen3.6
    litellm_params:
      model: openai/qwen3-next
      api_base: http://192.168.1.155:8014/v1
      api_key: dummy-vllm-no-auth
    model_info:
      mode: chat
      supports_vision: true
      supports_function_calling: true
      supports_parallel_function_calling: true
      supports_tool_choice: true
      supports_system_messages: true
      supports_response_schema: true
      max_tokens: 32768
      max_input_tokens: 32768
      max_output_tokens: 8192
      input_cost_per_token: 0.0
      output_cost_per_token: 0.0
  - model_name: qwen3.6-vibe
    litellm_params:
      model: openai/qwen3-next
      api_base: http://192.168.1.155:8014/v1
      api_key: dummy-vllm-no-auth
    model_info:
      mode: chat
      supports_vision: true
      supports_function_calling: true
      supports_parallel_function_calling: true
      supports_tool_choice: true
      supports_system_messages: true
      supports_response_schema: true
      max_tokens: 32768
      max_input_tokens: 32768
      max_output_tokens: 8192
      input_cost_per_token: 0.0
      output_cost_per_token: 0.0

  # Embeddings
  - model_name: nomic-embed
    litellm_params:
      model: openai/nomic-embed
      api_base: http://192.168.1.155:8013/v1
      api_key: dummy-vllm-no-auth
      encoding_format: float
    model_info:
      mode: embedding
      max_input_tokens: 8192
      output_vector_size: 768
      input_cost_per_token: 0.0

  - model_name: gemini-pro-latest
    litellm_params:
      model: gemini/gemini-pro-latest
      api_key: os.environ/GEMINI_API_KEY
    model_info:
      mode: chat
      supports_vision: true
      supports_function_calling: true
      supports_parallel_function_calling: true
      supports_tool_choice: true
      supports_system_messages: true
      supports_response_schema: true
      supports_reasoning: true
      max_tokens: 1048576
      max_input_tokens: 1048576
      max_output_tokens: 65536
      input_cost_per_token: 0.0
      output_cost_per_token: 0.0

  - model_name: gemini-flash-latest
    litellm_params:
      model: gemini/gemini-flash-latest
      api_key: os.environ/GEMINI_API_KEY
    model_info:
      mode: chat
      supports_vision: true
      supports_function_calling: true
      supports_parallel_function_calling: true
      supports_tool_choice: true
      supports_system_messages: true
      supports_response_schema: true
      supports_reasoning: true
      max_tokens: 1048576
      max_input_tokens: 1048576
      max_output_tokens: 65536
      input_cost_per_token: 0.0
      output_cost_per_token: 0.0


  # DeepSeek V4-Pro - hoechster Agentic-Score (71.2), 1M Context
  # 75% Rabatt bis 31.05.2026 -> effektiv $0.11 input / $0.22 output pro M Token
  - model_name: deepseek-v4-pro
    litellm_params:
      model: deepseek/deepseek-v4-pro
      api_key: os.environ/DEEPSEEK_API_KEY
    model_info:
      mode: chat
      supports_function_calling: true
      supports_parallel_function_calling: true
      supports_tool_choice: true
      supports_system_messages: true
      supports_response_schema: true
      max_tokens: 1048576
      max_input_tokens: 1048576
      max_output_tokens: 384000
      input_cost_per_token: 0.000000435
      output_cost_per_token: 0.00000087

  # DeepSeek V4-Flash - guenstig, hoehe Throughput, fuer Routine
  - model_name: deepseek-v4-flash
    litellm_params:
      model: deepseek/deepseek-v4-flash
      api_key: os.environ/DEEPSEEK_API_KEY
    model_info:
      mode: chat
      supports_function_calling: true
      supports_parallel_function_calling: true
      supports_tool_choice: true
      supports_system_messages: true
      max_tokens: 1048576
      max_input_tokens: 1048576
      max_output_tokens: 384000
      input_cost_per_token: 0.00000014
      output_cost_per_token: 0.00000028


  # ============================================================
  # qwen-chemicals: RAG-Wrapper vor qwen3-next, Korpus Gefahrstoffe/EMKG
  # Service-Code: github.com/sember1977/chemicals-rag-svc
  # ============================================================
  - model_name: deepseek-flash-Chemicals
    litellm_params:
      model: openai/deepseek-flash-Chemicals
      api_base: http://chemicals-rag-svc-deepseek:8021/v1
      api_key: dummy
    model_info:
      mode: chat
      supports_function_calling: true
      supports_system_messages: true
      max_tokens: 8192
      max_input_tokens: 32768
      max_output_tokens: 8192
      input_cost_per_token: 0.0
      output_cost_per_token: 0.0

  # ============================================================
  # IONOS AI Model Hub - DSGVO-konformer DE-Host (Frankfurt)
  # Endpoint: https://openai.inference.de-txl.ionos.com/v1
  # Function-Calling-Support unbestaetigt -> erst false, nach Smoke-Test ggf. anheben
  # ============================================================
  - model_name: ionos-llama405b
    litellm_params:
      model: openai/meta-llama/Meta-Llama-3.1-405B-Instruct-FP8
      api_base: https://openai.inference.de-txl.ionos.com/v1
      api_key: os.environ/IONOS_API_KEY
      temperature: 0
      top_p: 0.1
      # IONOS hostet Llama 3.1 ohne korrekt verdrahtete EOT-Token --
      # Modell labert sonst "assistant\n\n..." weiter. Stop-Sequenzen
      # zwingen den Schnitt vor dem naechsten Header.
      stop:
        - "<|eot_id|>"
        - "<|end_of_text|>"
        - "<|start_header_id|>"
        - "assistant\n\n"
    model_info:
      mode: chat
      supports_function_calling: false
      supports_system_messages: true
      max_tokens: 8192
      max_input_tokens: 32768
      max_output_tokens: 8192

  # ============================================================
  # chemicals-ionos: RAG-Backpack auf eigenstaendigem ionos-rag-svc
  # (Server 217.154.89.179:8080, pgvector+bge-m3+Llama405B in IONOS Cloud).
  # 2170 Chunks aus chem_examples+chem_regulations. v0.1.0 Backpack chemicals.
  # Repo: github.com/sember1977/ionos-rag-svc
  # ============================================================
  - model_name: chemicals-ionos
    litellm_params:
      model: openai/chemicals
      api_base: http://217.154.89.179:8080/v1
      api_key: os.environ/IONOS_RAG_PUBLIC_KEY
    model_info:
      mode: chat
      supports_function_calling: false
      supports_system_messages: true
      max_tokens: 8192
      max_input_tokens: 32768
      max_output_tokens: 8192
      input_cost_per_token: 0.0
      output_cost_per_token: 0.0

litellm_settings:
  drop_params: true
  num_retries: 2
  request_timeout: 300
  callbacks: custom_loggers.active_key_logger.active_key_logger_instance

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
